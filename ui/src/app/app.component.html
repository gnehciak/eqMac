<div #container fxLayout="column" class="container console" [ngStyle]="containerStyle">
  <eqm-loading class="loader" *ngIf="!loaded"></eqm-loading>
  <eqm-header class="header" id="header" #header
    (settingsToggled)="toggleDropdownSection('settings')"
    (helpToggled)="toggleDropdownSection('help')"
  ></eqm-header>
  <eqm-divider></eqm-divider>

  <eqm-settings id="dropdown-section"
    class="dropdown-section"
    (clickedOutside)="closeDropdownSection('settings', $event)"
    [@FadeInOut]
    [@FromTop]
    *ngIf="showDropdownSections.settings"
  ></eqm-settings>
  <eqm-help id="dropdown-section"
    class="dropdown-section"
    (clickedOutside)="closeDropdownSection('help', $event)"
    [@FadeInOut]
    [@FromTop]
    *ngIf="showDropdownSections.help"
  ></eqm-help>

  <!-- Console redesign: the audio pipeline as an always-visible strip -->
  <eqm-signal-chain
    #signalChain
    class="signal-chain-strip"
    *ngIf="ui.settings.signalChainFeatureEnabled"
    (focusStage)="onFocusStage($event)"
  ></eqm-signal-chain>
  <eqm-divider *ngIf="ui.settings.signalChainFeatureEnabled"></eqm-divider>

  <!-- Three-column console deck: left rail · EQ instrument · right rail -->
  <div fxLayout="row" fxFlex class="deck">

    <!-- LEFT RAIL: master + app mixer -->
    <div class="rail left-rail" fxLayout="column">
      <div id="stage-master" class="deck-section" [class.focused]="focusedStage === 'system'">
        <eqm-volume-booster-balance
          *ngIf="ui.settings.volumeFeatureEnabled || ui.settings.balanceFeatureEnabled"
          #volumeBoosterBalance
        ></eqm-volume-booster-balance>
      </div>
      <eqm-divider *ngIf="(ui.settings.volumeFeatureEnabled || ui.settings.balanceFeatureEnabled) && ui.settings.appMixerFeatureEnabled"></eqm-divider>

      <div id="stage-mixer" class="deck-section" [class.focused]="focusedStage === 'mixer'">
        <eqm-app-mixer *ngIf="ui.settings.appMixerFeatureEnabled" #appMixer></eqm-app-mixer>
      </div>
      <eqm-divider *ngIf="ui.settings.appMixerFeatureEnabled && ui.settings.superPresetsBarFeatureEnabled"></eqm-divider>
      <eqm-super-preset-bar *ngIf="ui.settings.superPresetsBarFeatureEnabled" #superPresetBar></eqm-super-preset-bar>
    </div>

    <eqm-divider orientation="vertical" class="column-divider"></eqm-divider>

    <!-- CENTER: the EQ instrument -->
    <div class="center-column" fxLayout="column" fxFlex>
      <div id="stage-eq" class="deck-section eq-instrument" [class.focused]="focusedStage === 'eq'">
        <eqm-equalizers fxFlex #equalizers *ngIf="ui.settings.equalizersFeatureEnabled"></eqm-equalizers>
      </div>
    </div>

    <eqm-divider orientation="vertical" class="column-divider"></eqm-divider>

    <!-- RIGHT RAIL: every effect module, parameters surfaced -->
    <div class="rail right-rail" fxLayout="column">
      <div id="stage-effects" class="deck-section"
        [class.focused]="focusedStage === 'routing' || focusedStage === 'crossfeed' || focusedStage === 'delay' || focusedStage === 'preamp'">
        <eqm-audio-effects *ngIf="ui.settings.effectsFeatureEnabled" #audioEffects></eqm-audio-effects>
      </div>
      <eqm-divider *ngIf="ui.settings.effectsFeatureEnabled && ui.settings.spatialFeatureEnabled"></eqm-divider>

      <div id="stage-spatial" class="deck-section" [class.focused]="focusedStage === 'spatial'">
        <eqm-spatial *ngIf="ui.settings.spatialFeatureEnabled" #spatial></eqm-spatial>
      </div>
      <eqm-divider *ngIf="ui.settings.spatialFeatureEnabled && ui.settings.audioUnitsFeatureEnabled"></eqm-divider>

      <div id="stage-fx" class="deck-section" [class.focused]="focusedStage === 'fx'">
        <eqm-audio-units *ngIf="ui.settings.audioUnitsFeatureEnabled" #audioUnits></eqm-audio-units>
      </div>
      <eqm-divider *ngIf="ui.settings.audioUnitsFeatureEnabled && ui.settings.recorderFeatureEnabled"></eqm-divider>

      <div id="stage-recorder" class="deck-section">
        <eqm-recorder *ngIf="ui.settings.recorderFeatureEnabled" #recorder></eqm-recorder>
      </div>
      <eqm-divider *ngIf="ui.settings.recorderFeatureEnabled && ui.settings.outputFeatureEnabled"></eqm-divider>

      <div id="stage-output" class="deck-section" [class.focused]="focusedStage === 'output'">
        <eqm-outputs *ngIf="ui.settings.outputFeatureEnabled" #outputs></eqm-outputs>
      </div>
    </div>

  </div>

  <!-- Status bar: version · transport (API/WS ports are a native follow-up) -->
  <eqm-divider></eqm-divider>
  <div class="status-bar" fxLayout="row" fxLayoutAlign="center center" fxLayoutGap="10px">
    <span class="status-item">{{ statusVersion }}</span>
    <span class="status-sep">·</span>
    <span class="status-item">{{ statusTransport }}</span>
  </div>

</div>
<eqm-tooltip-container class="tooltip-container" [scale]="ui.scale" [ngStyle]="containerStyle"></eqm-tooltip-container>
