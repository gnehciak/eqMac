<!-- Knob controls: two side-by-side Pro-style cards (Volume | Balance) -->
<div *ngIf="!replaceKnobsWithSliders" class="cards" fxLayout="row" fxLayoutAlign="space-between stretch" fxLayoutGap="8px">
  <eqm-booster *ngIf="ui.settings.volumeFeatureEnabled" fxFlex class="card knob-card" [hide]="hide"></eqm-booster>
  <eqm-balance *ngIf="ui.settings.balanceFeatureEnabled" fxFlex class="card knob-card" [hide]="hide"></eqm-balance>
</div>

<!-- Slider fallback (replaceKnobsWithSliders UI setting): stacked cards -->
<div *ngIf="replaceKnobsWithSliders" class="cards" fxLayout="column" fxLayoutGap="8px">
  <eqm-booster *ngIf="ui.settings.volumeFeatureEnabled" class="card slider-card" [hide]="hide"></eqm-booster>
  <eqm-balance *ngIf="ui.settings.balanceFeatureEnabled" class="card slider-card" [hide]="hide"></eqm-balance>
</div>
