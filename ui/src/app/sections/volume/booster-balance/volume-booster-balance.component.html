<!-- Knob controls: Volume above Balance. Each card holds a knob flanked by
     two value-screens (~154px), which would overflow the narrow left rail if
     placed side-by-side, so they are stacked full-width instead. -->
<div *ngIf="!replaceKnobsWithSliders" class="cards" fxLayout="column" fxLayoutAlign="start stretch" fxLayoutGap="8px">
  <eqm-booster *ngIf="ui.settings.volumeFeatureEnabled" class="card knob-card" [hide]="hide"></eqm-booster>
  <eqm-balance *ngIf="ui.settings.balanceFeatureEnabled" class="card knob-card" [hide]="hide"></eqm-balance>
</div>

<!-- Slider fallback (replaceKnobsWithSliders UI setting): stacked cards -->
<div *ngIf="replaceKnobsWithSliders" class="cards" fxLayout="column" fxLayoutGap="8px">
  <eqm-booster *ngIf="ui.settings.volumeFeatureEnabled" class="card slider-card" [hide]="hide"></eqm-booster>
  <eqm-balance *ngIf="ui.settings.balanceFeatureEnabled" class="card slider-card" [hide]="hide"></eqm-balance>
</div>
