<div fxFill class="outputs" fxLayout="row" fxLayoutAlign="space-between center" fxLayoutGap="10px">
  <eqm-icon (click)="select(selected)" name="reset" [color]="colors.accent" [eqmTooltip]="'outputs.resetPlayback' | translate" eqmTooltipPositionSide="top"></eqm-icon>
  <eqm-dropdown fxFlex
  labelParam="name" [noItemsPlaceholder]="'outputs.noOutputs' | translate" [placeholder]="'outputs.selectOutput' | translate" 
  [items]="outputs" [(selectedItem)]="selected" (itemSelected)="select($event)"
  ></eqm-dropdown>
  <eqm-vent></eqm-vent>
</div>
