<div class="header" fxLayout="row" fxLayoutAlign="space-between center" [style.height.px]="height">
  <div class="menu-buttons"
  fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="8px" fxFlex="40%"
  (mouseenter)="setShowBoolean('showLeftIcons', true)" (mouseleave)="setShowBoolean('showLeftIcons', false)"
  >
    <div class="circle-button left close" fxLayout="row" fxLayoutAlign="center center" (click)="close()">
      <eqm-icon *ngIf="showLeftIcons" [@FadeInOut] [stroke]=3 [strokeColor]="colors.dark" [color]="colors.dark" [width]="8" [height]="8" name="cross"></eqm-icon>
    </div>
    <div class="circle-button left minimize" fxLayoutAlign="center center" (click)="hide()">
      <eqm-icon *ngIf="showLeftIcons" [@FadeInOut] [color]="colors.dark" [width]="8" [height]="8" name="minus"></eqm-icon>
    </div>
    <div *ngIf="uiMode"
    class="circle-button left mode" fxLayoutAlign="center center"
    (click)="toggleUIMode()"
    [eqmTooltip]="(uiMode === 'window' ? 'header.popoverMode' : 'header.windowMode') | translate" eqmTooltipPositionSide="bottom">
      <eqm-icon *ngIf="showLeftIcons" [@FadeInOut] [color]="colors.dark" [width]="8" [height]="8" name="triangle" [rotate]="uiMode == 'window' ? -90 : 90"></eqm-icon>
    </div>
    <eqm-toggle [eqmTooltip]="(appEnabled ? 'header.bypassDisabled' : 'header.bypassEnabled') | translate" eqmTooltipPositionSide="bottom" [state]="appEnabled" (stateChange)="setAppEnabled($event)"></eqm-toggle>
  </div>

  <div fxFlex="40%" fxLayout="row" fxLayoutAlign="center center" class="title-area">
    <eqm-label class="app-title"> {{ 'header.title' | translate }} </eqm-label>
    <!-- Fork equivalent of the official Pro badge chip — brand name, not translated -->
    <div class="reborn-badge" fxLayout="row" fxLayoutAlign="center center">
      <eqm-label [fontSize]="10">Reborn</eqm-label>
    </div>
  </div>

  <div class="menu-buttons" fxFlex="40%"
  fxLayout="row" fxLayoutAlign="end center" fxLayoutGap="8px"
  >
    <div class="circle-button right"
    fxLayout="row" fxLayoutAlign="center center"
    (click)="toggleHelp($event)"
    [eqmTooltip]="'header.help' | translate" eqmTooltipPositionSide="bottom" [eqmTooltipDelay]="100">
      <eqm-icon class="settings" [@FadeInOut] [stroke]="0" [color]="colors.dark" [width]="10" [height]="10" name="help"></eqm-icon>
    </div>
    <div class="circle-button right"
    fxLayout="row" fxLayoutAlign="center center"
    (click)="toggleSettings($event)"
    [eqmTooltip]="'header.settings' | translate" eqmTooltipPositionSide="bottom" [eqmTooltipDelay]="100">
      <eqm-icon class="settings" [@FadeInOut] [stroke]="0" [color]="colors.dark" [width]="14" [height]="14" name="spanner-circle"></eqm-icon>
    </div>
    <div class="circle-button right" fxLayoutAlign="center center" (click)="quit()" [eqmTooltip]="'header.quit' | translate" eqmTooltipPositionSide="bottom">
      <eqm-icon [@FadeInOut] [color]="colors.dark" [width]="12" [height]="12" name="quit"></eqm-icon>
    </div>
  </div>
</div>
