<div class="card" fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="8px">

  <!-- Enable dot + title -->
  <eqm-checkbox
    [enabled]="available && app.enabled"
    [checked]="enabled"
    (checkedChange)="setEnabled($event)"
    [eqmTooltip]="(available ? 'superPresets.autoSwitch' : 'superPresets.requiresNewerVersion') | translate"
    eqmTooltipPositionSide="bottom"
  ></eqm-checkbox>
  <eqm-label class="title" [fontSize]="11">{{ titleLabelKey | translate }}</eqm-label>

  <!-- Rules dropdown -->
  <eqm-dropdown fxFlex
    [items]="ruleItems"
    labelParam="name"
    [searchable]="false"
    [enabled]="available && app.enabled && ruleItems.length > 0"
    [placeholder]="(ruleItems.length > 0 ? 'presets.selectPreset' : 'presets.noPresets') | translate"
    [noItemsPlaceholder]="'presets.noPresets' | translate"
    [selectedItem]="selectedRuleItem"
    (itemSelected)="selectRuleItem($event)"
  ></eqm-dropdown>

  <!-- Edit (pencil) -->
  <div class="button-container">
    <eqm-button
      type="square" [height]="20" [width]="20"
      [enabled]="available"
      (pressed)="openDialog()"
      [eqmTooltip]="editTooltipKey | translate"
      eqmTooltipPositionSide="bottom"
    >
      <eqm-icon name="pencil" [width]="11" [height]="11" [stroke]="2"></eqm-icon>
    </eqm-button>
  </div>

  <!-- Add (+) -->
  <div class="button-container">
    <eqm-button
      type="square" [height]="20" [width]="20"
      [enabled]="available"
      (pressed)="openDialog()"
      [eqmTooltip]="'superPresets.addRule' | translate"
      eqmTooltipPositionSide="bottom"
    >
      <eqm-icon name="cross" [width]="10" [height]="10" [stroke]="5" [rotate]="45"></eqm-icon>
    </eqm-button>
  </div>

</div>
