<eqm-options [options]="options"></eqm-options>
<div fxLayout="row" fxLayoutAlign="space-around center">
  <eqm-label *ngIf="info" style="margin-top: 10px;">{{ 'help.appVersion' | translate: { version: info.version } }}</eqm-label>
  <eqm-label *ngIf="info && info.driverVersion" style="margin-top: 10px;">{{ 'help.driverVersion' | translate: { version: info.driverVersion || '1.0.0' } }}</eqm-label>
  <eqm-label style="margin-top: 10px;">{{ 'help.uiVersion' | translate: { version: uiVersion } }}</eqm-label>
</div>
